<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Bone page, white cards, ink bands, slate + fog text" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .row{display:flex;height:150px;font-family:var(--font-mono)}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
  .sw .n{font-family:var(--font-sans);font-weight:600;font-size:13px}
  .sw .h{font-size:11px;margin-top:2px}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--paper)"><span class="n">Bone</span><span class="h" style="color:var(--muted)">#F7F6F3</span></div>
  <div class="sw" style="background:var(--white);border-left:1px solid var(--line)"><span class="n">White</span><span class="h" style="color:var(--muted)">#FFFFFF</span></div>
  <div class="sw" style="background:var(--ink)"><span class="n" style="color:var(--paper)">Ink</span><span class="h" style="color:var(--muted)">#131416</span></div>
  <div class="sw" style="background:var(--ink-soft)"><span class="n" style="color:#fff">Slate</span><span class="h" style="color:#d7d8da">#55585E</span></div>
  <div class="sw" style="background:var(--muted)"><span class="n" style="color:var(--ink)">Fog</span><span class="h" style="color:#33353a">#9FA2A7</span></div>
</div>
</body>
</html>
