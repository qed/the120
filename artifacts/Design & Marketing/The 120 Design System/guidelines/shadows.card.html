<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows & elevation" subtitle="Floating nav, resting card, CRM selected glow" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--paper)}
  .wrap{padding:34px;display:flex;gap:26px;font-family:var(--font-mono)}
  .item{flex:1;display:flex;flex-direction:column;gap:10px;align-items:center}
  .box{width:100%;height:70px;background:var(--white);border-radius:14px}
  .lbl{font-size:10px;color:var(--ink-soft);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-nav)"></div><span class="lbl">NAV<br>0 4 18 / .14</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="lbl">CARD<br>0 2 14 / .06</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-selected);border:1px solid var(--crm-blue)"></div><span class="lbl">CRM SELECTED<br>glow / .10</span></div>
</div>
</body>
</html>
