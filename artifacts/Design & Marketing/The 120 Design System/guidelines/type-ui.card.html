<!-- @dsCard group="Type" viewport="700x230" name="UI & body — Space Grotesk" subtitle="Subheads, body, numerals; weights 400–700" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--white)}
  .wrap{padding:34px 36px;display:flex;flex-direction:column;gap:16px;font-family:var(--font-sans)}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:5px}
  .title{font-weight:600;font-size:21px;letter-spacing:-0.01em;color:var(--ink)}
  .body{font-size:17px;line-height:1.6;color:var(--ink-soft);max-width:560px}
  .num{font-weight:700;font-size:44px;letter-spacing:-0.02em;color:var(--ink)}
  .num span{color:var(--red)}
</style>
</head>
<body>
<div class="wrap">
  <div><div class="lbl">TITLE / 600 / 21</div><div class="title">Membership is 3 things</div></div>
  <div><div class="lbl">BODY / 400 / 17 / 1.6 / SLATE</div><div class="body">A selective network of 120 kids across five groups, ages 8–17, building interesting lives together.</div></div>
  <div><div class="lbl">NUMERAL / 700 / 44</div><div class="num">1400<span>+</span></div></div>
</div>
</body>
</html>
