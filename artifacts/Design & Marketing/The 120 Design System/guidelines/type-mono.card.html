<!-- @dsCard group="Type" viewport="700x180" name="Labels — IBM Plex Mono" subtitle="Kickers, data labels, CTA labels — uppercase, letterspaced" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--white)}
  .wrap{padding:32px 36px;display:flex;flex-direction:column;gap:16px;font-family:var(--font-mono)}
  .lbl{font-size:11px;color:var(--muted)}
  .kick{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--red)}
  .data{font-size:11px;letter-spacing:0.08em;color:var(--ink-soft)}
  .cta{font-size:13px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;color:#fff;background:var(--red);padding:11px 20px;border-radius:10px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <div><div class="lbl" style="margin-bottom:5px">KICKER / 12 / 0.1EM / RED</div><div class="kick">01 · THE NETWORK</div></div>
  <div><div class="lbl" style="margin-bottom:5px">DATA LABEL / 11 / 0.08EM</div><div class="data">SAT BY 8TH GRADE · 2 HOUR LEARNING NETWORK</div></div>
  <div><span class="cta">JOIN THE 120</span></div>
</div>
</body>
</html>
