<!-- @dsCard group="Type" viewport="700x230" name="Display — Georgia" subtitle="Editorial headlines, weight 400, italic accent word" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--white)}
  .wrap{padding:34px 36px;display:flex;flex-direction:column;gap:18px}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:6px}
  .h1{font-family:var(--font-display);font-weight:400;font-size:56px;letter-spacing:-0.01em;line-height:1.04;color:var(--ink)}
  .h2{font-family:var(--font-display);font-weight:400;font-size:34px;letter-spacing:-0.01em;line-height:1.1;color:var(--ink)}
  i{font-style:italic;color:var(--red)}
</style>
</head>
<body>
<div class="wrap">
  <div><div class="lbl">DISPLAY / GEORGIA 400 / -0.01EM</div><div class="h1">There are <i>120 of them.</i></div></div>
  <div><div class="lbl">SECTION / GEORGIA 400 / 34</div><div class="h2">Every kid needs <i>their people</i></div></div>
</div>
</body>
</html>
