<!-- @dsCard group="Colors" viewport="700x150" name="Brand red & accents" subtitle="Canadian red (scarce, loud), blush + coral" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .row{display:flex;height:150px;font-family:var(--font-mono)}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
  .sw .n{font-family:var(--font-sans);font-weight:600;font-size:13px}
  .sw .h{font-size:11px;margin-top:2px}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--red)"><span class="n" style="color:#fff">Canadian Red</span><span class="h" style="color:var(--red-tint)">#D92632</span></div>
  <div class="sw" style="background:var(--red-dark)"><span class="n" style="color:#fff">Red · hover</span><span class="h" style="color:var(--red-tint)">#B31D28</span></div>
  <div class="sw" style="background:var(--blush)"><span class="n" style="color:var(--red-ink)">Blush</span><span class="h" style="color:var(--red-ink)">#EFC5B8</span></div>
  <div class="sw" style="background:var(--coral)"><span class="n" style="color:var(--red-ink)">Coral</span><span class="h" style="color:var(--red-ink)">#FF8A80</span></div>
</div>
</body>
</html>
