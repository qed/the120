<!-- @dsCard group="Colors" viewport="700x150" name="Functional & admin" subtitle="Admin bone, hairlines, sparing green/amber — never brand colours" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .row{display:flex;height:150px;font-family:var(--font-mono)}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
  .sw .n{font-family:var(--font-sans);font-weight:600;font-size:13px}
  .sw .h{font-size:11px;margin-top:2px}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--crm-bg)"><span class="n" style="color:var(--ink)">Admin bg</span><span class="h" style="color:var(--muted)">#ECEAE5</span></div>
  <div class="sw" style="background:var(--crm-line)"><span class="n" style="color:var(--ink)">Hairline</span><span class="h" style="color:var(--ink-soft)">#DDDAD4</span></div>
  <div class="sw" style="background:var(--green)"><span class="n" style="color:#fff">Green · paid</span><span class="h" style="color:rgba(255,255,255,0.8)">#0E8A5F</span></div>
  <div class="sw" style="background:var(--amber)"><span class="n" style="color:#fff">Amber · warn</span><span class="h" style="color:rgba(255,255,255,0.8)">#B85C00</span></div>
</div>
</body>
</html>
