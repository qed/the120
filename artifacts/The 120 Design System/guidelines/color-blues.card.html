<!-- @dsCard group="Colors" viewport="700x150" name="Electric blue" subtitle="One brand blue across every surface, plus its hover" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .row{display:flex;height:150px;font-family:var(--font-mono)}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
  .sw .n{font-family:var(--font-sans);font-weight:600;font-size:13px;color:#fff}
  .sw .h{font-size:11px;margin-top:2px;color:rgba(255,255,255,0.7)}
  .sw .r{font-size:10px;color:rgba(255,255,255,0.6)}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--blue)"><span class="r">STATEMENT BANDS · FOOTER · APP</span><span class="n">Electric blue</span><span class="h">#0300ED</span></div>
  <div class="sw" style="background:var(--blue-dark)"><span class="r">HOVER</span><span class="n">Electric dark</span><span class="h">#0200BD</span></div>
</div>
</body>
</html>
