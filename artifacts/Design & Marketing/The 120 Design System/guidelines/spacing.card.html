<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4-based rhythm; sections breathe at 88px" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--white)}
  .wrap{padding:28px 34px;display:flex;flex-direction:column;gap:10px;font-family:var(--font-mono)}
  .row{display:flex;align-items:center;gap:14px}
  .bar{height:14px;background:var(--red)}
  .lbl{font-size:10px;color:var(--ink-soft);width:70px}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="lbl">8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="lbl">14</span><span class="bar" style="width:14px"></span></div>
  <div class="row"><span class="lbl">22</span><span class="bar" style="width:22px"></span></div>
  <div class="row"><span class="lbl">36</span><span class="bar" style="width:36px"></span></div>
  <div class="row"><span class="lbl">88 · SECTION</span><span class="bar" style="width:88px"></span></div>
</div>
</body>
</html>
