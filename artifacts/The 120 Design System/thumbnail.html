<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0}
  .tile{width:1280px;height:854px;display:flex;font-family:var(--font-sans)}
  .main{flex:1;background:var(--red);display:flex;align-items:center;justify-content:center}
  .lockup{display:flex;align-items:center;gap:26px}
  .chip{background:#fff;color:var(--red);font-weight:700;font-size:150px;letter-spacing:-0.05em;line-height:0.8;padding:26px 34px}
  .word{display:flex;flex-direction:column;gap:10px}
  .word .name{color:#fff;font-weight:700;font-size:118px;letter-spacing:-0.03em;line-height:0.9}
  .word .sub{color:#fff;font-weight:500;font-size:34px;letter-spacing:0.3em}
  .strip{width:150px;display:flex;flex-direction:column}
  .strip span{flex:1}
</style>
</head>
<body>
<div class="tile">
  <div class="main">
    <div class="lockup">
      <div class="chip">120</div>
      <div class="word">
        <div class="name">The 120</div>
        <div class="sub">TORONTO</div>
      </div>
    </div>
  </div>
  <div class="strip">
    <span style="background:#efc5b8"></span>
    <span style="background:#0300ed"></span>
    <span style="background:#131416"></span>
  </div>
</div>
</body>
</html>
